# ⚠️ DATA SAFETY: Named volumes (mongodb_data, uploads_data) persist data across deployments
# NEVER run 'docker-compose down -v' as it DELETES ALL DATA including database and uploads!
# Safe commands:
#   - docker-compose up -d        (starts/restarts services, keeps data)
#   - docker-compose down         (stops services, keeps data)
#   - docker-compose build        (rebuilds images, keeps data)
# Dangerous (DATA LOSS):
#   - docker-compose down -v      (DELETES ALL VOLUMES!)

services:
  mongodb:
    image: mongo:6
    container_name: skud_mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db  # Persistent database storage
    networks:
      - skud_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: skud_backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=skud_taby
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=https://srpskoudruzenjetaby.se
      - SMTP_HOST=${SMTP_HOST:-mailcluster.loopia.se}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-info@srpskoudruzenjetaby.se}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-info@srpskoudruzenjetaby.se}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-SKUD Täby}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-production-secret-key-change-this}
    volumes:
      - uploads_data:/app/uploads  # Persistent file storage (pictures, invoices, etc.)
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - skud_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://srpskoudruzenjetaby.se
    container_name: skud_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - skud_network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: skud_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - skud_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/health || wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # SSL Certificate renewal service
  certbot:
    image: certbot/certbot
    container_name: skud_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - skud_network

networks:
  skud_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local
