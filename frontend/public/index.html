                <h1>Serbiska Kulturföreningen i Täby - SKUD Täby</h1>
                <h2>Srpsko Kulturno Udruženje Täby | Српско Културно Удружење Теби | Serbian Cultural Association Täby</h2>
                
                <p><strong>Svenska:</strong> Serbiska Kulturföreningen i Täby (SKUD Täby) är en ideell förening som bevarar och främjar serbisk kultur, traditioner, folkdans och folklor i Täby, Stockholm, Sverige. Vi organiserar kulturella evenemang, folkdanskurser, och samlar den serbiska gemenskapen i Stockholmsområdet. Välkommen att bli medlem!</p>
                
                <p><strong>Srpski:</strong> Srpsko Kulturno Udruženje Täby (SKUD Täby) je neprofitno udruženje koje čuva i promoviše srpsku kulturu, tradiciju, narodni ples i folklor u Täbiju, Stokholmu, Švedska. Organizujemo kulturne događaje, kurseve narodnog plesa i okupljamo srpsku zajednicu u Stokholmu. Dobrodošli!</p>
                
                <p><strong>Српски:</strong> Српско Културно Удружење Теби (СКУД Теби) је непрофитно удружење које чува и промовише српску културу, традицију, народни плес и фолклор у Тебију, Стокхолму, Шведска. Организујемо културне догађаје и окупљамо српску заједницу.</p>
                
                <p><strong>English:</strong> Serbian Cultural Association Täby (SKUD Täby) is a non-profit organization preserving and promoting Serbian culture, traditions, folk dance and folklore in Täby, Stockholm, Sweden. We organize cultural events, folk dance courses, and bring together the Serbian community in the Stockholm area.</p>
