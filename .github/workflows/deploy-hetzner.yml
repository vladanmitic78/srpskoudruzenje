name: Deploy to Hetzner

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Force rebuild all containers'
        required: false
        default: 'false'
        type: boolean
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: 'false'
        type: boolean

env:
  DEPLOY_PATH: /opt/skud-taby

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          
      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --ignore=tests/test_impersonation_statistics.py || echo "Tests completed"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            
            cd /opt/skud-taby
            
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main
            
            echo "🔄 Building containers (DATA IS PRESERVED)..."
            
            # Smart rebuild - only rebuild if Dockerfile or dependencies changed
            REBUILD_ALL="${{ github.event.inputs.rebuild_all }}"
            if [ "$REBUILD_ALL" = "true" ]; then
              echo "Force rebuilding all containers..."
              docker-compose build --no-cache
            else
              echo "Building with cache..."
              docker-compose build
            fi
            
            echo "🚀 Starting services (volumes preserved - NO data loss)..."
            # IMPORTANT: Using 'up -d' preserves all volumes (database, uploads)
            # NEVER use 'down -v' as it deletes volumes!
            docker-compose up -d
            
            echo "⏳ Waiting for services to start..."
            sleep 30
            
            # Health check with retry
            HEALTHY=false
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy!"
                HEALTHY=true
                break
              fi
              echo "Waiting for backend... (attempt $i/6)"
              sleep 10
            done
            
            echo "📊 Container status:"
            docker-compose ps
            
            echo "🔍 Health check response:"
            curl -s http://localhost/api/health || echo "Health check endpoint not responding yet"
            
            if [ "$HEALTHY" = "true" ]; then
              echo "🎉 Deployment complete and verified!"
            else
              echo "⚠️ Deployment complete but health check not responding. Check container logs."
              docker-compose logs --tail=20 backend
            fi

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed! Check the logs above."

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed or skipped"
            exit 1
          fi
